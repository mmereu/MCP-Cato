version: "3.8"

services:
  backend:
    build: ./backend
    container_name: cato-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - CORS_ORIGINS=http://localhost:8080,http://localhost
    networks:
      - cato-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: cato-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - cato-network

networks:
  cato-network:
    driver: bridge
